[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markery
markers =
    api: testy wymagające działającego serwera API na localhost:8080
    slow: testy używające prawdziwego API Open-Meteo (wolniejsze)
    unit: testy jednostkowe (izolowane, z mockami)
    integration: testy integracyjne

# Domyślne opcje
addopts =
    -v
    --tb=short
    --no-header
    -q

# Timeout per test (wymaga pytest-timeout)
# timeout = 60
